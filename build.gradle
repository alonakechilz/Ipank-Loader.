buildscript {
    repositories { google(); mavenCentral() }
    dependencies { classpath 'com.android.tools.build:gradle:7.0.4' }
}
allprojects {
    repositories { google(); mavenCentral() }
}
apply plugin: 'com.android.application'
android {
    compileSdk 31
    defaultConfig {
        applicationId "com.ipank.loader"
        minSdk 21
        targetSdk 31
    }
}
