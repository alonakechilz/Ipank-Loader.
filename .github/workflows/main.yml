name: Build APK Ipank
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Bikin Kunci Pas (Gradle Wrapper)
        run: |
          gradle wrapper --gradle-version 7.3.3
          chmod +x gradlew

      - name: Rakit APK Sekarang
        run: ./gradlew assembleDebug --stacktrace
          
      - name: Ambil Hasil APK
        uses: actions/upload-artifact@v4
        with:
          name: Ipank-Loader-Sultan
          path: "**/*.apk"
          
